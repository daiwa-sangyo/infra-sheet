<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>インフラ手配シート</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; font-size: 13px; color: #1a1a1a; background: #eeecea; min-height: 100vh; }

.layout { display: flex; min-height: 100vh; }
.sidebar { width: 210px; flex-shrink: 0; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; padding: 16px 0 20px; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 200; transition: transform .25s; }
.sidebar-title { font-size: 10px; font-weight: 700; letter-spacing: .1em; color: #555; padding: 0 14px 10px; text-transform: uppercase; }
.site-list { flex: 1; }
.site-item { display: flex; align-items: center; gap: 6px; padding: 9px 14px; cursor: pointer; border-left: 3px solid transparent; transition: background .1s; }
.site-item:hover { background: #2a2a2a; }
.site-item.active { background: #2d2d2d; border-left-color: #4a90d9; }
.site-item-name { flex: 1; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-add { margin: 8px 14px 0; background: none; border: 1px dashed #444; border-radius: 7px; color: #888; font-size: 11px; font-weight: 600; padding: 8px; cursor: pointer; font-family: inherit; width: calc(100% - 28px); text-align: center; }
.sidebar-add:hover { background: #2a2a2a; color: #fff; }
.sidebar-footer { padding: 12px 14px 0; border-top: 1px solid #2a2a2a; margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
.sf-btn { background: none; border: 1px solid #333; border-radius: 6px; color: #aaa; font-size: 11px; font-weight: 600; padding: 7px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 5px; }
.sf-btn:hover { background: #2a2a2a; color: #fff; }
.sf-btn.danger { color: #c55; border-color: #522; }
.sf-btn.danger:hover { background: #2a1010; color: #f55; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 190; }
.mobile-topbar { display: none; align-items: center; gap: 10px; padding: 12px 14px; background: #fff; border-bottom: 1px solid #e8e8e6; position: sticky; top: 0; z-index: 150; }
.hamburger { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 4px; padding: 4px; }
.hamburger span { display: block; width: 20px; height: 2px; background: #1a1a1a; border-radius: 2px; }
.mobile-title { font-size: 14px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.close-sidebar { display: none; background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer; padding: 0 14px; line-height: 1; }

.main { margin-left: 210px; padding: 20px 20px 60px; width: 100%; max-width: calc(210px + 860px); }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
.site-name-input { font-size: 18px; font-weight: 700; color: #1a1a1a; border: none; background: transparent; outline: none; font-family: inherit; flex: 1; min-width: 0; }
.site-name-input::placeholder { color: #ccc; }
.top-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.autosave-note { font-size: 11px; color: #aaa; white-space: nowrap; }
.top-btn { border: none; border-radius: 7px; font-size: 12px; font-weight: 600; padding: 7px 13px; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.btn-print { background: #1a1a1a; color: #fff; }
.btn-print:hover { background: #333; }
.btn-save { background: #fff; color: #1a1a1a; border: 1px solid #ddd; }
.btn-save:hover { background: #f5f5f3; }
.btn-load { background: #fff; color: #1a1a1a; border: 1px solid #ddd; }
.btn-load:hover { background: #f5f5f3; }
.btn-line { background: #06C755; color: #fff; }
.btn-line:hover { background: #05a847; }

.section-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; color: #999; margin: 16px 0 6px; text-transform: uppercase; }
.info-card { background: #fff; border: 1px solid #e8e8e6; border-radius: 10px; padding: 14px 16px; margin-bottom: 6px; display: flex; flex-direction: column; gap: 10px; }
.info-row { display: grid; gap: 10px; }
.r2 { grid-template-columns: 1fr 1fr; }
.r3 { grid-template-columns: 1fr 1fr 1fr; }
.r4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 10px; font-weight: 700; color: #999; }
.field input, .field select { border: 1px solid #e0e0de; border-radius: 5px; padding: 7px 8px; font-size: 13px; color: #1a1a1a; font-family: inherit; background: #fafafa; outline: none; width: 100%; -webkit-appearance: none; appearance: none; }
.field input:focus, .field select:focus { border-color: #4a90d9; background: #fff; }

.util-card { background: #fff; border: 1px solid #e8e8e6; border-radius: 10px; margin-bottom: 8px; overflow: hidden; transition: background .2s, border-color .2s; }
.util-card.is-done { background: #f4f4f4; border-color: #ddd; }
.util-card.is-done .util-head { background: #eeeeee; border-bottom-color: #e4e4e4; }
.util-card.is-done .util-name { color: #999; }
.util-card.is-done .util-icon { opacity: .45; }
.util-card.is-done .co-input,
.util-card.is-done .tel-input { color: #aaa; }
.util-card.is-done .provider-block { border-top-color: #e4e4e4; }
.util-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #fafafa; border-bottom: 1px solid #f0f0ee; flex-wrap: wrap; }
.util-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.util-name { font-size: 13px; font-weight: 700; width: 80px; flex-shrink: 0; }
.co-wrap { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 80px; }
.co-lbl  { font-size: 9px; font-weight: 700; color: #bbb; }
.co-input { border: none; border-bottom: 1px solid #e0e0de; padding: 3px 0; font-size: 12px; color: #1a1a1a; font-family: inherit; background: transparent; outline: none; width: 100%; }
.co-input:focus { border-bottom-color: #4a90d9; }
.tel-wrap { display: flex; flex-direction: column; gap: 2px; width: 200px; flex-shrink: 0; }
.tel-input { border: none; border-bottom: 1px solid #e0e0de; padding: 3px 0; font-size: 12px; color: #1a1a1a; font-family: inherit; background: transparent; outline: none; width: 100%; }
.tel-input:focus { border-bottom-color: #4a90d9; }

.btn-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.status-btn { border: none; border-radius: 5px; font-size: 11px; font-weight: 700; padding: 5px 10px; cursor: pointer; white-space: nowrap; font-family: inherit; min-width: 62px; text-align: center; }
.st-pending { background: #FFF3CD; color: #856404; }
.st-done    { background: #D4EDDA; color: #155724; }
.st-na      { background: #f0f0ee; color: #999; }

/* 防護管トグル */
.hogo-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; flex-shrink: 0; }
.hogo-track { position: relative; width: 34px; height: 20px; border-radius: 20px; background: #ddd; transition: background .2s; flex-shrink: 0; }
.hogo-track.on { background: #f59e0b; }
.hogo-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: transform .2s; }
.hogo-track.on .hogo-thumb { transform: translateX(14px); }
.hogo-txt { font-size: 11px; font-weight: 700; color: #bbb; white-space: nowrap; transition: color .2s; }
.hogo-track.on + .hogo-txt { color: #b45309; }

/* 立会いセレクト */
.立会-select { border: 1px solid #e0e0de; border-radius: 5px; padding: 4px 8px; font-size: 11px; font-weight: 600; color: #555; font-family: inherit; background: #fafafa; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; }
.立会-select:focus { border-color: #4a90d9; }

.util-body { padding: 10px 14px 12px; }
.provider-block { border-top: 1px solid #f0f0ee; padding: 10px 14px 0; }
.provider-block:last-of-type { padding-bottom: 0; }
.provider-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.provider-del-btn { background: none; border: none; font-size: 15px; color: #ddd; cursor: pointer; padding: 2px 4px; line-height: 1; flex-shrink: 0; }
.provider-del-btn:hover { color: #e55; }
.add-provider-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: 1px dashed #ccc; border-radius: 6px; font-size: 11px; color: #999; cursor: pointer; padding: 5px 12px; font-family: inherit; margin: 8px 14px 12px; }
.add-provider-btn:hover { border-color: #4a90d9; color: #4a90d9; }

.log-lbl  { font-size: 10px; font-weight: 700; color: #bbb; margin-bottom: 5px; }
.entry-row { display: grid; grid-template-columns: 120px 120px 80px 1fr 22px; gap: 6px; align-items: end; margin-bottom: 5px; }
.e-lbl    { font-size: 10px; color: #bbb; font-weight: 600; margin-bottom: 2px; }
.e-input  { border: 1px solid #e0e0de; border-radius: 5px; padding: 6px 7px; font-size: 12px; color: #1a1a1a; font-family: inherit; background: #fafafa; outline: none; width: 100%; -webkit-appearance: none; }
.e-input:focus { border-color: #4a90d9; background: #fff; }
.share-memo-wrap { margin-top: 6px; background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 7px 10px; }
.share-memo-lbl { font-size: 10px; font-weight: 700; color: #3b82f6; margin-bottom: 3px; }
.share-memo-input { width: 100%; border: none; background: transparent; outline: none; font-size: 12px; color: #1a1a1a; font-family: inherit; resize: vertical; min-height: 36px; line-height: 1.6; }
.del-btn  { background: none; border: none; font-size: 18px; color: #ddd; cursor: pointer; line-height: 1; padding: 3px; }
.del-btn:hover { color: #e55; }
.add-btn  { background: none; border: none; font-size: 12px; color: #4a90d9; cursor: pointer; padding: 4px 0; font-family: inherit; display: inline-flex; align-items: center; gap: 3px; margin-top: 2px; }
.add-btn:hover { color: #2a70b9; }
.memo-wrap { margin-top: 8px; }
.memo-lbl { font-size: 10px; font-weight: 700; color: #bbb; margin-bottom: 3px; }
.memo-input { width: 100%; border: 1px solid #e0e0de; border-radius: 5px; padding: 7px 8px; font-size: 12px; color: #1a1a1a; font-family: inherit; background: #fafafa; outline: none; resize: vertical; min-height: 42px; line-height: 1.6; }
.memo-input:focus { border-color: #4a90d9; background: #fff; }

.ic-elec  { background: #FFF3CD; }
.ic-gas   { background: #D1ECF1; }
.ic-water { background: #CCE5FF; }
.ic-net   { background: #D4EDDA; }
.ic-catv  { background: #FDEBD0; }
.ic-usen  { background: #FADBD8; }

/* LINE出力モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 12px; border-bottom: 1px solid #f0f0ee; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer; line-height: 1; }
.modal-body { padding: 14px 18px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.modal-textarea { width: 100%; border: 1px solid #e0e0de; border-radius: 8px; padding: 12px; font-size: 13px; font-family: inherit; background: #fafafa; outline: none; resize: none; line-height: 1.7; min-height: 260px; color: #1a1a1a; }
.modal-textarea:focus { border-color: #4a90d9; background: #fff; }
.modal-note { font-size: 11px; color: #aaa; }
.modal-footer { padding: 12px 18px; border-top: 1px solid #f0f0ee; display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn { border: none; border-radius: 7px; font-size: 13px; font-weight: 700; padding: 9px 18px; cursor: pointer; font-family: inherit; }
.modal-copy { background: #1a1a1a; color: #fff; }
.modal-copy:hover { background: #333; }
.modal-line { background: #06C755; color: #fff; }
.modal-line:hover { background: #05a847; }

.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; font-size: 12px; font-weight: 600; padding: 10px 18px; border-radius: 8px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }

@media (max-width: 700px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .close-sidebar { display: block; }
  .overlay.open { display: block; }
  .mobile-topbar { display: flex; }
  .main { margin-left: 0; padding: 12px 12px 60px; }
  .top-bar { display: none; }
  .info-row.r4 { grid-template-columns: 1fr 1fr; }
  .info-row.r3 { grid-template-columns: 1fr 1fr; }
  .entry-row { grid-template-columns: 1fr 1fr 70px 1fr 22px; }
  .util-name { width: 60px; }
  .tel-wrap { width: 160px; }
}
@media print {
  @page { size: A4; margin: 8mm; }
  body { background: #fff; }
  .sidebar, .overlay, .mobile-topbar, .modal-overlay, .toast { display: none !important; }
  .main { margin-left: 0; padding: 0; }
  .top-bar .top-actions { display: none; }
  .add-btn, .del-btn, .provider-del-btn, .add-provider-btn { display: none; }
  .util-card, .info-card { break-inside: avoid; }
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 0 10px">
      <div class="sidebar-title" style="padding-bottom:0">現場一覧</div>
      <button class="close-sidebar" onclick="closeSidebar()">×</button>
    </div>
    <div class="site-list" id="site-list"></div>
    <button class="sidebar-add" onclick="newSite()">＋ 新規現場を追加</button>
    <div class="sidebar-footer">
      <button class="sf-btn" onclick="duplicateSite()">📋 現場を複製</button>
      <button class="sf-btn danger" onclick="deleteSite()">🗑 この現場を削除</button>
    </div>
  </div>

  <div class="main">
    <div class="mobile-topbar">
      <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
      <span class="mobile-title" id="mobile-title">インフラ手配シート</span>
      <button class="top-btn btn-save" onclick="saveData()">💾</button>
      <button class="top-btn btn-line" onclick="openLineModal()">📤 LINE出力</button>
    </div>

    <div class="top-bar">
      <input class="site-name-input" id="f-siteName" type="text" placeholder="現場名称を入力" oninput="onBasicInput()">
      <div class="top-actions">
        <span class="autosave-note" id="autosave-note"></span>
        <button class="top-btn btn-save" onclick="saveData()">💾 保存</button>
        <button class="top-btn btn-load" onclick="loadData()">📂 読み込み</button>
        <button class="top-btn btn-line" onclick="openLineModal()">📤 LINE出力</button>
        <button class="top-btn btn-print" onclick="window.print()">🖨 PDF出力</button>
      </div>
    </div>

    <div class="section-label">基本情報</div>
    <div class="info-card">
      <div class="info-row r2">
        <div class="field"><label>現場名称</label><input type="text" id="f-siteName2" placeholder="〇〇解体工事" oninput="onBasicInput2(this)"></div>
        <div class="field"><label>物件名</label><input type="text" id="f-building" placeholder="〇〇ビル" oninput="onBasicInput()"></div>
      </div>
      <div class="info-row">
        <div class="field"><label>現場住所</label><input type="text" id="f-addr" placeholder="〒000-0000 東京都〇〇区〇〇" oninput="onBasicInput()"></div>
      </div>
      <div class="info-row r3">
        <div class="field"><label>所有会社</label><input type="text" id="f-ownerCo" oninput="onBasicInput()"></div>
        <div class="field"><label>担当者（所有会社）</label><input type="text" id="f-ownerPerson" oninput="onBasicInput()"></div>
        <div class="field"><label>担当者TEL</label><input type="tel" id="f-ownerTel" placeholder="00-0000-0000" oninput="onBasicInput()"></div>
      </div>
      <div class="info-row r4">
        <div class="field"><label>着工日</label><input type="date" id="f-startDate" oninput="onBasicInput()"></div>
        <div class="field"><label>退去日</label><input type="date" id="f-vacateDate" oninput="onBasicInput()"></div>
        <div class="field"><label>現場責任者</label><input type="text" id="f-manager" oninput="onBasicInput()"></div>
        <div class="field"><label>現場責任者TEL</label><input type="tel" id="f-managerTel" placeholder="000-0000-0000" oninput="onBasicInput()"></div>
      </div>
    </div>

    <div class="section-label">インフラ設備</div>
    <div id="utils-container"></div>
  </div>
</div>

<!-- LINE出力モーダル -->
<div class="modal-overlay" id="line-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📤 LINE出力</span>
      <button class="modal-close" onclick="closeLineModal()">×</button>
    </div>
    <div class="modal-body">
      <textarea class="modal-textarea" id="line-output" spellcheck="false"></textarea>
      <p class="modal-note">防護管（トグルON）と撤去完了（ステータス「完了」）の設備が出力されます。内容を確認・編集してからコピーまたはLINEで送信してください。</p>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-copy" onclick="copyLineText()">📋 コピー</button>
      <button class="modal-btn modal-line" onclick="sendLine()">💬 LINEで開く</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const UTILS_DEF = [
  {id:'elec',  icon:'⚡', label:'電気',      cls:'ic-elec',  defCo:'東京電力',            defTel:'0120-995-007（321）', hogo:true},
  {id:'gas',   icon:'🔥', label:'ガス',      cls:'ic-gas',   defCo:'東京ガスネットワーク', defTel:'03-6627-6257（32）',  hogo:false},
  {id:'water', icon:'💧', label:'水道',      cls:'ic-water', defCo:'東京都水道局',         defTel:'0570-091-100',        hogo:false},
  {id:'net',   icon:'🌐', label:'ネット回線', cls:'ic-net',   multi:true, defProviders:['NTT','KDDI'], hogo:true,
   providerDefs:[
     {co:'NTT',  telLabel:'Web受付番号', tel:'0120-444-113（232）'},
     {co:'KDDI', telLabel:'電話番号',    tel:'0120-005-142'},
   ]},
  {id:'catv',  icon:'📺', label:'CATV',      cls:'ic-catv',  defCo:'J:COM',               defTel:'0120-999-000（243）', hogo:true},
  {id:'usen',  icon:'🎵', label:'USEN',      cls:'ic-usen',  defCo:'USEN',                defTel:'0120-117-440（199）', hogo:true},
];
const STATUSES=[{key:'pending',label:'対応中',cls:'st-pending'},{key:'done',label:'完了',cls:'st-done'},{key:'na',label:'該当なし',cls:'st-na'}];
const BASIC_IDS=['siteName','building','addr','ownerCo','ownerPerson','ownerTel','startDate','vacateDate','manager','managerTel'];
const LS_KEY='infra_sheet_v2';

let sites=[], currentSiteId=null;
function makeSiteId(){return 'site_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function newSiteData(base){
  const s=base?JSON.parse(JSON.stringify(base)):null;
  return {id:makeSiteId(), basic:s?s.basic:{}, utils:s?s.utils:{}, netProviders:s?[...s.netProviders]:['NTT','KDDI']};
}
function defUtil(){return {status:'pending',hogo:false,立会:'不要',立会撤去:'不要',hogoDate:'',entries:[],note:'',shareMemo:'',co:'',tel:''};}
function saveAll(){localStorage.setItem(LS_KEY,JSON.stringify({sites,currentSiteId}));showAutosave();}
function loadAll(){try{const r=localStorage.getItem(LS_KEY);if(!r)return false;const d=JSON.parse(r);sites=d.sites||[];currentSiteId=d.currentSiteId||null;return true;}catch{return false;}}
function curSite(){return sites.find(s=>s.id===currentSiteId);}

// DOM→state
function syncDomToSite(){
  const site=curSite(); if(!site) return;
  BASIC_IDS.forEach(id=>{const el=document.getElementById('f-'+id)||(id==='siteName'?document.getElementById('f-siteName2'):null);if(el)site.basic[id]=el.value;});
  // siteName は2か所あるので両方から拾う
  const sn1=document.getElementById('f-siteName'); if(sn1&&sn1.value) site.basic.siteName=sn1.value;
  const sn2=document.getElementById('f-siteName2'); if(sn2&&sn2.value) site.basic.siteName=sn2.value;

  function syncKey(key, isNet, pi){
    if(!site.utils[key]) site.utils[key]=defUtil();
    const d=site.utils[key];
    if(isNet){const co=document.getElementById('co-'+key);if(co){site.netProviders[pi]=co.value;d.co=co.value;}}
    else{const co=document.getElementById('co-'+key);if(co)d.co=co.value;}
    const tel=document.getElementById('tel-'+key); if(tel) d.tel=tel.value;
    const mt=document.getElementById('memo-'+key); if(mt) d.note=mt.value;
    const ta=document.getElementById('tatiai-'+key); if(ta) d.立会=ta.value;

// ══ LINE出力 ══════════════════════════════════════
function formatDate(dateStr){
  if(!dateStr) return '';
  const d=new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return dateStr;
  const DOW=['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}月${d.getDate()}日(${DOW[d.getDay()]})`;
}

function buildLineText(){
  syncDomToSite();
  const site=curSite(); if(!site) return '';
  const siteName=site.basic.siteName||'現場名';
  const blocks=[];

  // 全設備を定義順に収集
  const allItems=[];
  UTILS_DEF.forEach(u=>{
    if(u.multi){
      (site.netProviders||[]).forEach((p,pi)=>{
        const key='net_'+pi;
        const co=(site.utils[key]&&site.utils[key].co)||p||'';
        allItems.push({key, label:co, co, pi, defHogo:true});
      });
    } else {
      const co=(site.utils[u.id]&&site.utils[u.id].co)||u.defCo||u.label;
      allItems.push({key:u.id, label:u.label, co, pi:undefined, defHogo:!!u.hogo});
    }
  });

  // ── ① 防護管ブロック（防護管ON かつ 該当なし以外） ──
  allItems.forEach(({key,co,defHogo})=>{
    if(!defHogo) return;
    const d=site.utils[key]; if(!d) return;
    if(!d.hogo) return;       // 防護管トグルがOFFはスキップ
    if(d.status==='na') return; // 該当なしはスキップ
    const hogoDate=d.hogoDate||'';
    const tatiai=d.立会||'不要';
    let b=`【${co}防護カバー】`;
    b+=`\n・取付日:${hogoDate?formatDate(hogoDate):'未定'}`;
    b+=`\n・立会い${tatiai==='あり'?'あり':'不要'}`;
    // 撤去完了済みなら※で追記
    const stopDate=d.entries&&d.entries.length>0?d.entries.find(e=>e.stopDate)?.stopDate:'';
    if(stopDate&&d.status==='done'){
      b+=`\n※${formatDate(stopDate)}引込線撤去済み`;
    }
    blocks.push(b);
  });

  // ── ② 撤去・停止ブロック（完了のもの） ──────────────
  allItems.forEach(({key,label,co})=>{
    const d=site.utils[key]; if(!d) return;
    if(d.status!=='done') return; // 完了のみ
    const displayName=label||co;
    const stopDate=d.entries&&d.entries.length>0?d.entries.find(e=>e.stopDate)?.stopDate:'';
    const stopTime=d.entries&&d.entries.length>0?d.entries.find(e=>e.stopDate)?.stopTime||'':'';
    const tatiai=d.立会撤去||d.立会||'不要';
    let b=`【${displayName}】`;
    b+=`\n・撤去日:${stopDate?formatDate(stopDate):'未定'}${stopTime?' '+stopTime:''}`;
    b+=`\n・立会い${tatiai==='あり'?'あり':'不要'}`;
    if(d.shareMemo) b+=`\n・${d.shareMemo}`;
    blocks.push(b);
  });

  if(blocks.length===0) return `${siteName}インフラ関係\n\n（出力対象の設備がありません）\n\n※ 防護管：トグルON、撤去：ステータスを「完了」にすると出力されます`;
  return `${siteName}インフラ関係\n\n`+blocks.join('\n');
}

window.openLineModal=()=>{
  const text=buildLineText();
  document.getElementById('line-output').value=text;
  document.getElementById('line-modal').classList.add('open');
};
window.closeLineModal=()=>document.getElementById('line-modal').classList.remove('open');

window.copyLineText=()=>{
  const text=document.getElementById('line-output').value;
  navigator.clipboard.writeText(text).then(()=>showToast('📋 コピーしました')).catch(()=>{
    document.getElementById('line-output').select();document.execCommand('copy');showToast('📋 コピーしました');
  });
};
window.sendLine=()=>{
  const text=document.getElementById('line-output').value;
  const url='https://line.me/R/share?text='+encodeURIComponent(text);
  window.open(url,'_blank');
};

// トースト
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
let asTimer=null;
function showAutosave(){const el=document.getElementById('autosave-note');if(!el)return;el.textContent='保存済み ✓';clearTimeout(asTimer);asTimer=setTimeout(()=>{el.textContent='';},2000);}

// 既存データに電話番号が未設定の場合デフォルト値を補完
function migrateDefaults(){
  // 単体設備のデフォルトTELマップ
  const defTelMap = {
    elec:  '0120-995-007（321）',
    gas:   '03-6627-6257（32）',
    water: '0570-091-100',
    catv:  '0120-999-000（243）',
    usen:  '0120-117-440（199）',
  };
  // ネット回線プロバイダのデフォルトTEL
  const netDefTel = ['0120-444-113（232）','0120-005-142'];

  sites.forEach(site=>{
    // 単体設備
    Object.entries(defTelMap).forEach(([id,tel])=>{
      if(!site.utils[id]) return;
      if(!site.utils[id].tel) site.utils[id].tel = tel;
    });
    // ネット回線
    (site.netProviders||[]).forEach((_,pi)=>{
      const key='net_'+pi;
      if(!site.utils[key]) return;
      if(!site.utils[key].tel && netDefTel[pi]) site.utils[key].tel = netDefTel[pi];
    });
  });
}

// 初期化
(function init(){
  if(!loadAll()||sites.length===0){const s=newSiteData();sites=[s];currentSiteId=s.id;}
  if(!currentSiteId||!sites.find(s=>s.id===currentSiteId))currentSiteId=sites[0].id;
  migrateDefaults();
  saveAll();
  const site=curSite();
  currentNetProviders=site.netProviders?[...site.netProviders]:['NTT','KDDI'];
  renderUtilsContainer(site);applyBasic(site);applyUtils(site);renderSidebar();
})();

// ── 保存・読み込み ────────────────────────────────
window.saveData=()=>{
  syncDomToSite(); saveAll();
  const site=curSite();
  const name=(site&&site.basic&&site.basic.siteName)||'infra';
  const blob=new Blob([JSON.stringify({sites,currentSiteId},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${name}_インフラ手配.json`;a.click();
  URL.revokeObjectURL(url);
  showToast('💾 保存しました');
};
window.loadData=()=>document.getElementById('file-input').click();
window.onFileLoad=e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.sites){sites=d.sites;currentSiteId=d.currentSiteId||d.sites[0].id;}
      saveAll();
      const site=curSite();
      currentNetProviders=site.netProviders?[...site.netProviders]:['NTT','KDDI'];
      renderUtilsContainer(site);applyBasic(site);applyUtils(site);renderSidebar();
      showToast('📂 読み込みました');
    }catch{showToast('⚠ 読み込みに失敗しました');}
    e.target.value='';
  };
  reader.readAsText(file);
};
</script>
<input type="file" id="file-input" accept=".json" style="display:none" onchange="onFileLoad(event)">
</body>
